<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Line Chad Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e29;
    --border: #1f2435;
    --text: #e8eaf0;
    --muted: #6b7280;
    --gold: #f5a623;
    --silver: #9ca3af;
    --bronze: #cd7f32;
    --green: #22c55e;
    --red: #ef4444;
    --accent: #f5a623;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1px;
    color: var(--text);
  }

  .logo-text span {
    color: var(--gold);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }

  .nav-btn {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 7px 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.3px;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.8rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--text);
  }

  /* RANKING LIST */
  .rankings-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .rank-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    animation: slideIn 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .rank-card:hover {
    border-color: rgba(245,166,35,0.3);
    background: var(--surface2);
    transform: translateX(3px);
  }

  /* Top 3 left accent */
  .rank-card.top1::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); border-radius: 3px 0 0 3px; }
  .rank-card.top2::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--silver); border-radius: 3px 0 0 3px; }
  .rank-card.top3::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--bronze); border-radius: 3px 0 0 3px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rank-num {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .rank-num.gold   { background: var(--gold); color: #000; }
  .rank-num.silver { background: #374151; color: var(--silver); }
  .rank-num.bronze { background: #2d2018; color: var(--bronze); }
  .rank-num.normal { background: var(--surface2); color: var(--muted); }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1px;
  }

  .info {
    flex: 1;
    min-width: 0;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .name {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }

  .badge {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge.hot    { background: rgba(245,166,35,0.18); color: var(--gold); }
  .badge.rising { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.you    { background: rgba(99,102,241,0.18); color: #818cf8; }

  .title-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .rank-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .delta {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .delta.up   { background: rgba(34,197,94,0.12); color: var(--green); }
  .delta.down { background: rgba(239,68,68,0.12); color: var(--red); }
  .delta.same { background: var(--surface2); color: var(--muted); }

  .chevron {
    color: var(--muted);
    font-size: 1rem;
    opacity: 0.5;
  }

  /* DIVIDER */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 2.5rem 0;
    position: relative;
  }

  .section-divider::after {
    content: 'LOWER BRACKET';
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    padding: 0 12px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }

  footer span { color: var(--gold); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="logo-icon">🏆</div>
    <div class="logo-text">THE <span>LINE</span> CHAD RANKINGS</div>
  </div>
  <ul class="nav-links">
    <li><a href="#">Rankings</a></li>
    <li><a href="#">Rules</a></li>
    <li><a href="#">Lexicon</a></li>
    <li><a href="#">Vote</a></li>
    <li><a href="#">Battle</a></li>
    <li><a href="#">Community</a></li>
  </ul>
  <button class="nav-btn">⚔️ Challenge</button>
</nav>

<main>
  <div class="section-header">
    <span style="font-size:1.6rem;">🏆</span>
    <h1 class="section-title">Official Rankings</h1>
  </div>

  <div class="rankings-list" id="rankingsList"></div>
</main>

<footer>
  THE LINE CHAD RANKINGS &nbsp;·&nbsp; <span>Official & Binding</span> &nbsp;·&nbsp; Updated April 2026
</footer>

<script>
  const members = [
    { name: "Braxton", isYou: true },
    { name: "Aiden" },
    { name: "Finn" },
    { name: "Jayden" },
    { name: "Max" },
    { name: "Landon" },
    { name: "Bennett" },
  ];

  const titles = [
    "Genetic Apex", "The Chosen One", "Unmatched Drip", "Living Legend",
    "Peak Specimen", "Natural Born Leader", "The Sleeper", "Raw Talent",
    "The Contender", "Future King", "The Grinder", "Certified Unit"
  ];

  const avatarColors = [
    "#1e3a5f", "#1e3a2f", "#3a1e1e", "#2d1e3a", "#3a2d1e", "#1e2d3a", "#2a1e3a"
  ];

  // Shuffle members (but keep Braxton somewhere — random position)
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const ranked = shuffle(members);

  const deltas = ["+3", "+1", "+2", "–1", "+1", "–2", "+4", "–3", "+1", "+2", "–1", "+1"];
  const usedTitles = shuffle([...titles]);

  function getRankNumClass(i) {
    if (i === 0) return 'gold';
    if (i === 1) return 'silver';
    if (i === 2) return 'bronze';
    return 'normal';
  }

  function getCardClass(i) {
    if (i === 0) return 'rank-card top1';
    if (i === 1) return 'rank-card top2';
    if (i === 2) return 'rank-card top3';
    return 'rank-card';
  }

  function getDelta(i, total) {
    const last = total - 1;
    let v;
    if (i === 0) {
      v = 3;
    } else if (i === last) {
      v = -1;
    } else {
      const mid = [1, -1, 2, -2, 1];
      v = mid[(i - 1) % mid.length];
    }
    if (v > 0) return { label: `+${v}`, cls: 'up' };
    if (v < 0) return { label: `${v}`, cls: 'down' };
    return { label: '–', cls: 'same' };
  }

  function getBadge(member, i) {
    if (member.isYou) return ``;
    if (i === 0) return `<span class="badge hot">🔥 Hot</span>`;
    if (i <= 2) return `<span class="badge rising">↑ Rising</span>`;
    return '';
  }

  const list = document.getElementById('rankingsList');
  let html = '';

  ranked.forEach((member, i) => {
    const delta = getDelta(i, ranked.length);
    const title = usedTitles[i % usedTitles.length];
    const initial = member.name[0].toUpperCase();
    const bgColor = avatarColors[i % avatarColors.length];
    const delay = i * 60;

    if (i === 4) {
      html += `<div class="section-divider"></div>`;
    }

    html += `
      <div class="${getCardClass(i)}" style="animation-delay:${delay}ms">
        <div class="rank-num ${getRankNumClass(i)}">${i + 1}</div>
        <div class="avatar" style="background:${bgColor}; color:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'#9ca3af'}">${initial}</div>
        <div class="info">
          <div class="name-row">
            <span class="name">${member.name}</span>
            ${getBadge(member, i)}
          </div>
          <div class="title-sub">${title}</div>
        </div>
        <div class="rank-right">
          <div class="delta ${delta.cls}">
            ${delta.cls === 'up' ? '↗' : delta.cls === 'down' ? '↘' : '→'} ${delta.label}
          </div>
          <span class="chevron">›</span>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
</script>

</body>
</html>
